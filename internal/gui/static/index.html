<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eigen</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app" class="shell">
      <aside class="rail">
        <div class="brand">
          <div class="mark">λ</div>
          <div>
            <div class="name">Eigen</div>
            <div id="daemon" class="subtle">connecting…</div>
          </div>
        </div>
        <button id="new-session" class="primary">New session</button>
        <div class="rail-head">Sessions</div>
        <div id="sessions" class="sessions"></div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="session-heading">
            <div id="title" class="title">Select a session</div>
            <div id="meta" class="meta">Live daemon workspace</div>
          </div>
          <div class="actions">
            <label class="control-pill">perm
              <select id="perm-select">
                <option value="gated">gated</option>
                <option value="auto">auto</option>
              </select>
            </label>
            <label class="control-pill optional" id="search-control">search
              <select id="search-select">
                <option value="off">off</option>
                <option value="auto">auto</option>
                <option value="on">on</option>
              </select>
            </label>
            <button id="fast-toggle" class="ghost optional" type="button">Fast</button>
            <button id="clear" class="ghost danger" type="button">Clear</button>
            <button id="interrupt" class="ghost" type="button">Interrupt</button>
            <button id="resend" class="ghost" type="button">Resend</button>
          </div>
        </header>

        <section id="timeline" class="timeline empty">
          <div class="empty-state">
            <div class="empty-title">Eigen GUI starts here.</div>
            <div class="empty-copy">Open or create a session. The agent stream will become an inspectable activity timeline.</div>
          </div>
        </section>

        <form id="composer" class="composer">
          <textarea id="input" rows="1" placeholder="Ask Eigen to build, inspect, fix, or explain…"></textarea>
          <button class="send" type="submit">Send</button>
        </form>
      </main>

      <aside class="inspector">
        <div class="panel-title">Inspector</div>
        <div id="inspector" class="inspector-body">Tool calls, diffs, approvals, and workspace context will land here.</div>
      </aside>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
