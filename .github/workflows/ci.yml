name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    name: Go gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run gate
        env:
          HOME: ${{ runner.temp }}/eigen-home
        run: |
          mkdir -p "$HOME/.eigen"
          printf '{"dev":{"ssh":"ubuntu@example.invalid"}}\n' > "$HOME/.eigen/hosts.json"
          make gate

  race:
    name: Focused race tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run focused race tests
        env:
          HOME: ${{ runner.temp }}/eigen-home
        run: |
          mkdir -p "$HOME/.eigen"
          printf '{"dev":{"ssh":"ubuntu@example.invalid"}}\n' > "$HOME/.eigen/hosts.json"
          make race
